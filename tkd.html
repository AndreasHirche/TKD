<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TKD — Taekwondo Sparring</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23111'/><text x='16' y='22' font-family='monospace' font-size='11' font-weight='900' fill='%23ffdd00' text-anchor='middle'>TKD</text></svg>">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%}
  body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;overflow:hidden;font-family:'Courier New',monospace;user-select:none;-webkit-user-select:none}
  canvas{display:block;width:100%;height:auto;max-width:800px;border:2px solid #333;touch-action:none}
  #keys{margin-top:8px;font-size:1rem;color:#555;text-align:center;line-height:1.9}
  #keys b{color:#aaa;background:#222;padding:1px 8px;border-radius:3px;border:1px solid #444;font-size:1rem}
  /* ── Mobile controls ── */
  #ctrl-row{display:none;width:100%;max-width:800px;padding:8px 10px;justify-content:space-between;gap:6px;touch-action:none}
  .cside{display:flex;flex-direction:column;gap:6px;align-items:center}
  .crow{display:flex;gap:6px}
  .cb{min-width:clamp(52px,13vw,84px);height:clamp(52px,13vw,84px);background:rgba(255,255,255,0.13);border:2px solid rgba(255,255,255,0.35);border-radius:50%;color:#e8e8e8;font-size:clamp(.72rem,3vw,1.05rem);font-weight:700;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.1;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;padding:2px}
  .cb.on{filter:brightness(2.4) saturate(1.3)!important;border-color:rgba(255,255,255,0.95)!important}
  /* ── Joystick ── */
  #joystick-base{width:clamp(140px,32vw,175px);height:clamp(140px,32vw,175px);background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.35);border-radius:50%;position:relative;touch-action:none;flex-shrink:0}
  #joystick-knob{width:56px;height:56px;background:rgba(255,255,255,0.22);border:2px solid rgba(255,255,255,0.7);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
  .joy-lbl{position:absolute;font-size:clamp(.88rem,3.5vw,1.15rem);font-family:'Courier New',monospace;color:rgba(255,255,255,0.65);font-weight:700;white-space:nowrap;line-height:1;pointer-events:none}
  /* ── Action button grid ── */
  .act-grid{display:grid;grid-template-columns:repeat(2,clamp(76px,19vw,114px));grid-auto-rows:clamp(76px,19vw,114px);gap:8px}
  .act-grid .cb{min-width:unset!important;width:100%!important;height:100%!important;border-radius:15px!important;white-space:normal!important;font-size:clamp(.68rem,2.6vw,.88rem)!important;font-weight:900!important;padding:6px 5px!important;line-height:1.3!important;border-width:2.5px!important}
  .cb-block{background:rgba(59,130,246,0.22)!important;border-color:rgba(96,165,250,0.72)!important;color:#bfdbfe!important}
  .cb-punch{background:rgba(239,68,68,0.22)!important;border-color:rgba(248,113,113,0.72)!important;color:#fecaca!important}
  .cb-hkick{background:rgba(168,85,247,0.22)!important;border-color:rgba(192,132,252,0.72)!important;color:#e9d5ff!important}
  .cb-rkick{background:rgba(245,158,11,0.22)!important;border-color:rgba(251,191,36,0.72)!important;color:#fde68a!important}
  .cb-kick{background:rgba(16,185,129,0.22)!important;border-color:rgba(52,211,153,0.72)!important;color:#a7f3d0!important}
  /* portrait: canvas top, controls below */
  @media(pointer:coarse) and (orientation:portrait){
    #keys{font-size:1.05rem;color:#777;padding:4px 10px}
    #ctrl-row{display:flex}
    body{justify-content:flex-start;overflow-y:auto;overflow-x:hidden}
    canvas{max-height:40dvh}
    #joystick-base{width:clamp(140px,32vw,175px)!important;height:clamp(140px,32vw,175px)!important}
  }
  /* landscape: controls beside canvas, not overlaid */
  @media(pointer:coarse) and (orientation:landscape){
    #keys{display:none}
    body{overflow:hidden;flex-direction:row;justify-content:center;align-items:center}
    canvas{
      order:0;height:100dvh;width:auto;
      max-width:min(calc(100dvh * 1.7391),calc(100vw - 220px));
      max-height:100dvh;border:none;flex-shrink:0
    }
    #ctrl-row{display:contents}
    #ctrl-left{
      order:-1;display:flex!important;
      width:122px;height:100dvh;
      align-items:center;justify-content:center;flex-shrink:0
    }
    #ctrl-right{
      order:1;display:flex!important;
      width:98px;height:100dvh;
      align-items:center;justify-content:center;flex-shrink:0;padding-bottom:12px;overflow:hidden
    }
    #joystick-base{width:114px!important;height:114px!important}
    #joystick-knob{width:42px!important;height:42px!important}
    .joy-lbl{font-size:.75rem!important}
    .cb{min-width:38px!important;height:38px!important;font-size:.75rem!important}
    .cb-block{background:rgba(59,130,246,0.22)!important;border-color:rgba(96,165,250,0.72)!important;color:#bfdbfe!important}
    .cb-punch{background:rgba(239,68,68,0.22)!important;border-color:rgba(248,113,113,0.72)!important;color:#fecaca!important}
    .cb-hkick{background:rgba(168,85,247,0.22)!important;border-color:rgba(192,132,252,0.72)!important;color:#e9d5ff!important}
    .cb-rkick{background:rgba(245,158,11,0.22)!important;border-color:rgba(251,191,36,0.72)!important;color:#fde68a!important}
    .cb-kick{background:rgba(16,185,129,0.22)!important;border-color:rgba(52,211,153,0.72)!important;color:#a7f3d0!important}
    .act-grid{grid-template-columns:repeat(1,84px)!important;grid-auto-rows:38px!important;gap:4px!important}
    .act-grid .cb{font-size:.75rem!important;padding:4px 5px!important;line-height:1.2!important;border-radius:9px!important}
    .ph-act{display:none!important}
    .cb.on{filter:brightness(2.6) saturate(1.3)!important;border-color:rgba(255,255,255,0.95)!important}
  }
</style>
</head>
<body>
<canvas id="c" width="800" height="460"></canvas>
<div id="keys">
  <b>← →</b> WEN / ORUN &nbsp; <b>↑</b> NOPUNDE &nbsp; <b>↓</b> NAJUNDE &nbsp; <b>SPACE</b> MAKGI<br>
  <b>A</b> AP JOOMUK &nbsp; <b>S</b> AP CHA BUSIGI &nbsp; <b>D</b> DWIT CHAGI &nbsp; <b>F</b> DOLLYO CHAGI
</div>
<div id="ctrl-row">
  <div id="ctrl-left" class="cside">
    <div id="joystick-base">
      <div id="joystick-knob"></div>
      <span class="joy-lbl" style="top:5px;left:50%;transform:translateX(-50%)">NOPUNDE</span>
      <span class="joy-lbl" style="bottom:5px;left:50%;transform:translateX(-50%)">NAJUNDE</span>
      <span class="joy-lbl" style="left:4px;top:50%;transform:translateY(-50%)">WEN</span>
      <span class="joy-lbl" style="right:2px;top:50%;transform:translateY(-50%)">ORUN</span>
    </div>
  </div>
  <div id="ctrl-right" class="cside">
    <div class="act-grid">
      <div class="cb cb-block" data-key="Space">MAKGI</div>
      <div class="cb cb-punch" data-key="KeyA">AP JOOMUK</div>
      <div class="ph-act"></div>
      <div class="cb cb-hkick" data-key="KeyF">DOLLYO CHAGI</div>
      <div class="cb cb-rkick" data-key="KeyD">DWIT CHAGI</div>
      <div class="cb cb-kick" data-key="KeyS">AP CHA BUSIGI</div>
    </div>
  </div>
</div>
<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const W = 800, H = 460, GY = 380;
const GRAV = 0.55, SPD = 3.2;

// ── Audio ──────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function tone(freq, dur, type='square', vol=0.18, decay=true) {
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, AC.currentTime);
    if (decay) g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + dur);
  } catch(e) {}
}
function sfx(n) {
  if (n==='punch')   { tone(220,0.07,'square',0.22); }
  if (n==='kick')    { tone(160,0.1,'sawtooth',0.28); tone(100,0.08,'square',0.12); }
  if (n==='hit')     { tone(110,0.18,'sawtooth',0.35); }
  if (n==='block')   { tone(320,0.06,'square',0.18); }
  if (n==='ko')      { tone(70,0.5,'sawtooth',0.4); }
  if (n==='score')   { tone(440,0.08,'square',0.18); setTimeout(()=>tone(660,0.15,'square',0.2),80); }
  if (n==='bell')    { [330,440,550,660].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'square',0.2),i*100)); }
  if (n==='end')     { [660,550,440,330,220].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'sawtooth',0.28),i*160)); }
}

// ── Input ──────────────────────────────────────────────────────────────────
const K = {};
const FS  = matchMedia('(pointer:coarse)').matches ? 2   : 1; // canvas text scale for mobile
const FSM = matchMedia('(pointer:coarse)').matches ? 1.4 : 1; // lighter scale for menu
addEventListener('keydown', e => { K[e.code]=true;  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault(); });
addEventListener('keyup',   e => { K[e.code]=false; });

// ── Mobile touch controls ───────────────────────────────────────────────────
document.querySelectorAll('.cb').forEach(btn => {
  const key = btn.dataset.key;
  btn.addEventListener('pointerdown', e => {
    e.preventDefault();
    K[key] = true;
    btn.classList.add('on');
    btn.setPointerCapture(e.pointerId);
    if (AC.state === 'suspended') AC.resume();
  });
  btn.addEventListener('pointerup',     () => { K[key]=false; btn.classList.remove('on'); });
  btn.addEventListener('pointercancel', () => { K[key]=false; btn.classList.remove('on'); });
});
cv.addEventListener('pointerdown', () => {
  if (AC.state === 'suspended') AC.resume();
  if (game.state===STATES.MATRIX) { game.state=STATES.MENU; return; }
  if (game.state===STATES.MENU || (game.state===STATES.OVER && game.annSub)) {
    K['Enter']=true; setTimeout(()=>K['Enter']=false, 100);
  }
});

// Virtual joystick
(function(){
  const base=document.getElementById('joystick-base');
  const knob=document.getElementById('joystick-knob');
  if(!base||!knob)return;
  let activeId=null,bx=0,by=0,br=55;
  function joyKeys(dx,dy,dist){
    K['ArrowLeft']=K['ArrowRight']=K['ArrowUp']=K['ArrowDown']=false;
    if(dist<br*0.22)return;
    const nx=dx/dist,ny=dy/dist;
    if(nx>0.4)K['ArrowRight']=true;
    if(nx<-0.4)K['ArrowLeft']=true;
    if(ny<-0.4)K['ArrowUp']=true;
    if(ny>0.55)K['ArrowDown']=true;
  }
  function updateJoy(tcx,tcy){
    const dx=tcx-bx,dy=tcy-by,dist=Math.sqrt(dx*dx+dy*dy);
    const r=Math.min(dist,br*0.55),a=Math.atan2(dy,dx);
    knob.style.transform=`translate(calc(-50% + ${Math.cos(a)*r}px),calc(-50% + ${Math.sin(a)*r}px))`;
    joyKeys(dx,dy,dist);
  }
  function reset(){
    knob.style.transform='translate(-50%,-50%)';
    K['ArrowLeft']=K['ArrowRight']=K['ArrowUp']=K['ArrowDown']=false;
    activeId=null;
  }
  base.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.changedTouches[0];activeId=t.identifier;
    const rect=base.getBoundingClientRect();
    bx=rect.left+rect.width/2;by=rect.top+rect.height/2;br=rect.width/2;
    updateJoy(t.clientX,t.clientY);
    if(AC.state==='suspended')AC.resume();
  },{passive:false});
  base.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches)if(t.identifier===activeId){updateJoy(t.clientX,t.clientY);break;}
  },{passive:false});
  base.addEventListener('touchend',e=>{
    e.preventDefault();
    for(const t of e.changedTouches)if(t.identifier===activeId){reset();break;}
  },{passive:false});
  base.addEventListener('touchcancel',()=>reset(),{passive:true});
})();

// ── Constants ──────────────────────────────────────────────────────────────
const STATES = {
  MATRIX:'matrix', MENU:'menu', INTRO:'intro', FIGHT:'fight', PAUSE:'pause', ROUNDEND:'roundend', OVER:'over'
};
const INTRO_STEPS = [
  {text:'CHARYOT!',  dur:80,  pose:'idle'},
  {text:'KYONG YE!', dur:100, pose:'bow'},
  {text:'SIJAK!',    dur:65,  pose:'idle'}
];
const CHAR_TYPES = [
  {sk:'#f4c5a0', hr:'#1a0a00'},
  {sk:'#f4c5a0', hr:'#1a0a00', f:true},
  {sk:'#e8a060', hr:'#140800'},
  {sk:'#e8a060', hr:'#140800', f:true},
  {sk:'#c07040', hr:'#0e0500'},
  {sk:'#c07040', hr:'#0e0500', f:true},
  {sk:'#6b3010', hr:'#080200'},
  {sk:'#6b3010', hr:'#080200', f:true},
];

// ── Matrix rain ────────────────────────────────────────────────────────────
const HANGUL = '태권도가나다라마바사아자차카파하기공격방어발차기주먹겨루기단수련무예형마음일이삼사오육칠팔구십';
const MTX_COL_W = 20;
const MTX_NCOLS = Math.ceil(W / MTX_COL_W);
const mtxCols = Array.from({length: MTX_NCOLS}, () => ({
  y: Math.random() * H, speed: 1.5 + Math.random() * 3.5, tick: 0
}));
const MTX_DUR = 210;
let mtxAge = 0;
function drawMatrixFrame() {
  cx.fillStyle = 'rgba(0,0,0,0.07)';
  cx.fillRect(0, 0, W, H);
  cx.font = '16px sans-serif';
  cx.textAlign = 'center';
  mtxCols.forEach((col, i) => {
    if (++col.tick < 2) return;
    col.tick = 0;
    cx.fillStyle = i % 2 === 0 ? '#80c8ff' : '#ff8080';
    cx.fillText(HANGUL[Math.floor(Math.random() * HANGUL.length)], i * MTX_COL_W + MTX_COL_W / 2, col.y);
    col.y += col.speed;
    if (col.y > H + 20) { col.y = Math.random() * -120; col.speed = 1.5 + Math.random() * 3.5; }
  });
  cx.textAlign = 'left';
}

// ── Background ─────────────────────────────────────────────────────────────
function drawBG(round) {
  [drawBG_r1, drawBG_r2, drawBG_r3][(round||1)-1]();
}

// Round 1 – Halle background image
var _bgImg_r1 = null;
function drawBG_r1() {
  cx.save();
  if (!_bgImg_r1) {
    _bgImg_r1 = new Image();
    _bgImg_r1.src = 'halle.jpg';
  }
  if (_bgImg_r1.complete && _bgImg_r1.naturalWidth) {
    cx.drawImage(_bgImg_r1, 0, 0, W, H);
  } else {
    cx.fillStyle = '#2e86ab'; cx.fillRect(0, 0, W, H);
    _bgImg_r1.onload = null;
  }
  cx.restore();
}

// Round 2 – M2.png background image
var _bgImg_r2 = null;
function drawBG_r2() {
  cx.save();
  if (!_bgImg_r2) {
    _bgImg_r2 = new Image();
    _bgImg_r2.src = 'M2.png';
  }
  if (_bgImg_r2.complete && _bgImg_r2.naturalWidth) {
    cx.drawImage(_bgImg_r2, 0, 0, W, H);
  } else {
    cx.fillStyle = '#8a6030'; cx.fillRect(0, 0, W, H);
  }
  cx.restore();
}

// Round 3 – 설악산 Seoraksan by Night (밤)
function drawBG_r3() {
  cx.save();
  const sky=cx.createLinearGradient(0,0,0,GY);
  sky.addColorStop(0,'#020210'); sky.addColorStop(1,'#0c0c28');
  cx.fillStyle=sky; cx.fillRect(0,0,W,GY);
  // Stars
  cx.fillStyle='#fff';
  [[45,25],[115,16],[192,44],[312,18],[408,36],[498,22],[596,42],[692,28],[752,50],
   [155,64],[275,52],[444,70],[626,58],[88,84],[375,78],[510,34],[648,72]].forEach(([sx,sy])=>{
    cx.fillRect(sx,sy,2,2);
  });
  // Moon
  cx.fillStyle='#f0e8c0';
  cx.beginPath(); cx.arc(680,85,38,0,Math.PI*2); cx.fill();
  cx.fillStyle='#ddd8a0';
  cx.beginPath(); cx.arc(666,76,8,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(690,95,5,0,Math.PI*2); cx.fill();
  cx.fillStyle='rgba(240,230,180,0.1)';
  cx.beginPath(); cx.arc(680,85,62,0,Math.PI*2); cx.fill();
  // Far jagged mountains (Seoraksan)
  cx.fillStyle='#18183a';
  cx.beginPath();
  [[0,GY],[70,GY-108],[140,GY-76],[215,GY-148],[290,GY-92],[368,GY-168],
   [442,GY-102],[514,GY-142],[592,GY-82],[664,GY-122],[732,GY-88],[800,GY]]
    .forEach(([px,py],i)=>i===0?cx.moveTo(px,py):cx.lineTo(px,py));
  cx.closePath(); cx.fill();
  // Snow caps
  cx.fillStyle='rgba(235,242,255,0.85)';
  [[215,GY-148,13],[368,GY-168,16],[514,GY-142,12]].forEach(([px,py,pw])=>{
    cx.beginPath(); cx.moveTo(px,py); cx.lineTo(px-pw,py+26); cx.lineTo(px+pw,py+26); cx.fill();
  });
  // Mid mountains (closer)
  cx.fillStyle='#26264a';
  cx.beginPath();
  [[0,GY],[58,GY-72],[96,GY-54],[154,GY-92],[214,GY-62],[288,GY-108],[356,GY-70],
   [432,GY-100],[512,GY-66],[578,GY-90],[648,GY-56],[712,GY-82],[800,GY]]
    .forEach(([px,py],i)=>i===0?cx.moveTo(px,py):cx.lineTo(px,py));
  cx.closePath(); cx.fill();
  stoneLantern(105, GY); stoneLantern(695, GY);
  pagodaNight(230, GY);
  // Flagpole + 태극기 (night – slightly dimmed)
  cx.strokeStyle='#666'; cx.lineWidth=3; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(590,GY); cx.lineTo(590,GY-155); cx.stroke();
  cx.globalAlpha=0.72;
  koreanFlag(592, GY-155, 60, 40);
  cx.globalAlpha=1;
  const grd=cx.createLinearGradient(0,GY,0,H);
  grd.addColorStop(0,'#1a1a20'); grd.addColorStop(1,'#0a0a10');
  cx.fillStyle=grd; cx.fillRect(0,GY,W,H-GY);
  cx.strokeStyle='#24242a'; cx.lineWidth=2;
  cx.beginPath(); cx.moveTo(0,GY); cx.lineTo(W,GY); cx.stroke();
  cx.strokeStyle='rgba(55,55,65,0.5)'; cx.lineWidth=1;
  for(let gx=0;gx<W;gx+=55) { cx.beginPath(); cx.moveTo(gx,GY); cx.lineTo(gx,H); cx.stroke(); }
  cx.restore();
}

// ── Scene element helpers ──────────────────────────────────────────────────
function gwanghwamun(x, y) {
  // Stone gate base with three arches
  cx.fillStyle='#788080'; cx.fillRect(x-90,y-55,180,55);
  cx.fillStyle='#120a08';
  cx.beginPath(); cx.arc(x,y-16,18,Math.PI,0,true);
  cx.lineTo(x+18,y); cx.lineTo(x-18,y); cx.closePath(); cx.fill();
  [-52,52].forEach(ox=>{
    cx.beginPath(); cx.arc(x+ox,y-13,13,Math.PI,0,true);
    cx.lineTo(x+ox+13,y); cx.lineTo(x+ox-13,y); cx.closePath(); cx.fill();
  });
  // Bracket cornice
  cx.fillStyle='#7a1008'; cx.fillRect(x-94,y-73,188,20);
  cx.fillStyle='#5a0a06';
  for(let bx=x-86;bx<=x+76;bx+=28) { cx.beginPath(); cx.arc(bx,y-73,7,Math.PI,0); cx.fill(); }
  // Lower hall + dancheong stripe
  cx.fillStyle='#8a1808'; cx.fillRect(x-82,y-113,164,42);
  cx.fillStyle='#1a6618'; cx.fillRect(x-84,y-116,168,6);
  // Lower curved roof
  cx.fillStyle='#1a3c10';
  cx.beginPath(); cx.moveTo(x-106,y-110); cx.quadraticCurveTo(x,y-134,x+106,y-110);
  cx.lineTo(x+102,y-113); cx.lineTo(x-102,y-113); cx.closePath(); cx.fill();
  cx.fillStyle='#265018';
  cx.beginPath(); cx.moveTo(x-108,y-110); cx.lineTo(x,y-132); cx.lineTo(x+108,y-110);
  cx.lineTo(x+102,y-112); cx.lineTo(x,y-128); cx.lineTo(x-102,y-112); cx.closePath(); cx.fill();
  // Upper hall
  cx.fillStyle='#8a1808'; cx.fillRect(x-58,y-153,116,42);
  cx.fillStyle='#1a6618'; cx.fillRect(x-60,y-155,120,6);
  // Upper curved roof
  cx.fillStyle='#1a3c10';
  cx.beginPath(); cx.moveTo(x-78,y-150); cx.quadraticCurveTo(x,y-172,x+78,y-150);
  cx.lineTo(x+74,y-153); cx.lineTo(x-74,y-153); cx.closePath(); cx.fill();
  cx.fillStyle='#265018';
  cx.beginPath(); cx.moveTo(x-80,y-150); cx.lineTo(x,y-170); cx.lineTo(x+80,y-150);

}

function pagodaNight(x, y) {

    cx.fillStyle='#0e0e1e';

    yy-=h+4;
  });
  cx.fillStyle='#0e0e1e'; cx.fillRect(x-40,y-8,80,8);

function koreanFlag(x, y, w, h) {
  cx.save();
  // White background
  cx.fillStyle='#fff'; cx.fillRect(x,y,w,h);

  const cfx=x+w*0.5, cfy=y+h*0.5;
  const r=h*0.28, r2=r*0.5;

  // 태극 (Taeguk): red full circle → blue bottom half → blue small circle upper → red small circle lower
  cx.fillStyle='#cd2e3a';
  cx.beginPath(); cx.arc(cfx,cfy,r,0,Math.PI*2); cx.fill();

  cx.fillStyle='#003478';
  cx.beginPath(); cx.arc(cfx,cfy,r,0,Math.PI,false); cx.closePath(); cx.fill();
  cx.beginPath(); cx.arc(cfx,cfy-r2,r2,0,Math.PI*2); cx.fill();

  cx.fillStyle='#cd2e3a';
  cx.beginPath(); cx.arc(cfx,cfy+r2,r2,0,Math.PI*2); cx.fill();

  // Trigrams (괘) – scaled bars
  const bw=w*0.20, bh=Math.max(1.5,h*0.055), bg=h*0.042, brk=bw*0.2;
  function triBar(tx,ty,solid){
    cx.fillStyle='#000';
    if(solid){
      cx.fillRect(tx-bw/2,ty-bh/2,bw,bh);
    } else {
      cx.fillRect(tx-bw/2,ty-bh/2,bw/2-brk/2,bh);
      cx.fillRect(tx+brk/2,ty-bh/2,bw/2-brk/2,bh);
    }
  }
  function trigram(tx,ty,top,mid,bot){
    triBar(tx,ty-(bh+bg),top);
    triBar(tx,ty,mid);
    triBar(tx,ty+(bh+bg),bot);
  }
  const ox=w*0.27, oy=h*0.21;
  trigram(cfx-ox, cfy-oy, true,  true,  true ); // 건 ☰ upper-left
  trigram(cfx+ox, cfy-oy, true,  false, true ); // 이 ☲ upper-right
  trigram(cfx-ox, cfy+oy, false, true,  false); // 감 ☵ lower-left
  trigram(cfx+ox, cfy+oy, false, false, false); // 곤 ☷ lower-right

  cx.strokeStyle='#bbb'; cx.lineWidth=0.5;
  cx.strokeRect(x,y,w,h);
  cx.restore();
}

// ── Fighter ────────────────────────────────────────────────────────────────
class Fighter {
  constructor(x, dir, isPlayer, name, belt) {
    this.x=x; this.y=GY; this.vy=0; this.vx=0;
    this.dir=dir; this.isPlayer=isPlayer; this.name=name; this.belt=belt;
    this.hp=100; this.score=0;
    this.state='idle'; this.sTimer=0; this.fIdx=0; this.fTick=0;
    this.grounded=true; this.blocking=false; this.crouching=false;
    this.atkActive=false; this.didHit=false;
    this.flash=0; this.iFrames=0;
    this.aiCD=0; this.aiState='approach';
    const ct = CHAR_TYPES[Math.floor(Math.random() * CHAR_TYPES.length)];
    this.charSk = ct.sk; this.charHr = ct.hr; this.charFem = ct.f || false;
  }
  get body() { return {x:this.x-18,y:this.y-88,w:36,h:88}; }
  get atkBox() {
    if (!this.atkActive) return null;
    const d=this.dir;
    let ox,oy,w=38,h=18;
    switch(this.state){
      case 'punch':      ox=d*32; oy=-52; break;
      case 'kick_f':     ox=d*38; oy=-38; break;
      case 'kick_r':     ox=d*40; oy=-50; w=42; break;
      case 'kick_h':     ox=d*30; oy=-72; break;
      case 'kick_j':     ox=d*42; oy=-44; w=44; break;
      default: return null;
    }
    return {x:this.x+ox-w/2, y:this.y+oy-h/2, w, h};
  }
  atk(type) {
    const busy=['punch','kick_f','kick_r','kick_h','kick_j','hit','down'];
    if (busy.includes(this.state)) return;
    this.state=type; this.sTimer=0; this.fIdx=0; this.fTick=0;
    this.atkActive=false; this.didHit=false;
    sfx(type==='punch'?'punch':'kick');
  }
  hurt(dmg, type) {
    if (this.iFrames>0||this.state==='down') return 0;
    if (this.blocking) { sfx('block'); this.hp=Math.max(0,this.hp-Math.floor(dmg*0.15)); return 0; }
    this.hp=Math.max(0,this.hp-dmg);
    this.flash=10; this.iFrames=25;
    sfx('hit');
    let pts = type==='punch'?1:type==='kick_f'?2:type==='kick_r'?2:type==='kick_h'?3:3;
    if (dmg>=18||this.hp<=0) {
      this.state='down'; this.sTimer=0; sfx('ko'); pts++;
    } else { this.state='hit'; this.sTimer=0; }
    return pts;
  }
  update(opp) {
    if (this.flash>0) this.flash--;
    if (this.iFrames>0) this.iFrames--;
    this.fTick++;
    if (this.fTick>=5) { this.fTick=0; this.fIdx++; }
    this.sTimer++;

    // State logic
    switch(this.state) {
      case 'idle': this.atkActive=false; this.blocking=false; break;
      case 'walk_f': case 'walk_b': this.atkActive=false; this.blocking=false; break;
      case 'punch':
        if(this.fIdx===1) this.atkActive=true;
        if(this.fIdx>=3) this.atkActive=false;
        if(this.fIdx>=5) { this.state='idle'; }
        break;
      case 'kick_f':
        if(this.fIdx===1) this.atkActive=true;
        if(this.fIdx>=3) this.atkActive=false;
        if(this.fIdx>=6) this.state='idle';
        break;
      case 'kick_r':
        if(this.fIdx===5) this.atkActive=true;
        if(this.fIdx>=7) this.atkActive=false;
        if(this.fIdx>=9) this.state='idle';
        break;
      case 'kick_h':
        if(this.fIdx===1) this.atkActive=true;
        if(this.fIdx>=3) this.atkActive=false;
        if(this.fIdx>=7) this.state='idle';
        break;
      case 'kick_j':
        if(this.fIdx>=1) this.atkActive=true;
        break;
      case 'hit':
        if(this.sTimer>=18) { this.state='idle'; this.atkActive=false; }
        break;
      case 'down':
        if(this.sTimer>=110) { this.state='idle'; this.iFrames=50; }
        break;
      case 'block':
        this.atkActive=false;
        break;
      case 'crouch':
        this.atkActive=false;
        break;
      case 'jump':
        break;
    }
    if (!this.atkActive) this.didHit=false;

    if (this.isPlayer) this.playerInput(opp);
    else this.aiLogic(opp);

    // Physics
    if (!this.grounded) { this.vy+=GRAV; }
    this.y+=this.vy; this.x+=this.vx; this.vx=0;
    if (this.y>=GY) {
      this.y=GY; this.vy=0; this.grounded=true;
      if (this.state==='jump'||this.state==='kick_j') this.state='idle';
    }
    this.x = Math.max(55, Math.min(W-55, this.x));
    // Auto-face
    const atk=['punch','kick_f','kick_r','kick_h','kick_j','hit','down'];
    if (!atk.includes(this.state)) this.dir = opp.x>this.x ? 1 : -1;
  }
  playerInput(opp) {
    const atk=['punch','kick_f','kick_r','kick_h','kick_j'];
    if (['hit','down'].includes(this.state)) return;
    const inAtk=atk.includes(this.state);

    // Block
    if (K['Space']&&!inAtk) { this.state='block'; this.blocking=true; return; }
    if (this.state==='block'&&!K['Space']) { this.state='idle'; this.blocking=false; }

    if (inAtk) return;

    // Attacks
    if (K['KeyA']) { this.atk('punch');  K['KeyA']=false; return; }
    if (K['KeyS']) { this.atk('kick_f'); K['KeyS']=false; return; }
    if (K['KeyD']) { this.atk('kick_r'); K['KeyD']=false; return; }
    if (K['KeyF']) { this.atk('kick_h'); K['KeyF']=false; return; }

    // Jump kick in air
    if (!this.grounded && (K['KeyS']||K['KeyD']||K['KeyF'])) { this.atk('kick_j'); return; }

    // Jump
    if (K['ArrowUp']&&this.grounded) {
      this.vy=-13; this.grounded=false; this.state='jump';
    }
    // Crouch
    if (K['ArrowDown']&&this.grounded) {
      this.crouching=true; this.state='crouch';
    } else {
      if (this.crouching) this.state='idle';
      this.crouching=false;
    }
    // Move
    if (K['ArrowRight']) { this.vx=SPD; if(this.grounded&&!this.crouching) this.state=this.dir===1?'walk_f':'walk_b'; }
    else if (K['ArrowLeft']) { this.vx=-SPD; if(this.grounded&&!this.crouching) this.state=this.dir===1?'walk_b':'walk_f'; }
    else if (this.state==='walk_f'||this.state==='walk_b') this.state='idle';
  }
  aiLogic(opp) {
    this.aiCD--;
    const busy=['punch','kick_f','kick_r','kick_h','kick_j','hit','down','block'];
    if (busy.includes(this.state)&&this.state!=='block') return;
    if (this.aiCD>0) return;
    const dist=Math.abs(this.x-opp.x);
    const range=110;

    if (this.state==='block') {
      if (Math.random()>0.35) { this.state='idle'; this.blocking=false; }
      this.aiCD=20; return;
    }
    if (dist>range+20) {
      this.vx=this.dir*2.8; this.state='walk_f';
    } else if (dist<60) {
      this.vx=-this.dir*2.5; this.state='walk_b';
    } else {
      const r=Math.random();
      if (r<0.08) { this.state='block'; this.blocking=true; this.aiCD=30; return; }
      else if (r<0.22) this.atk('kick_h');
      else if (r<0.42) this.atk('kick_r');
      else if (r<0.60) this.atk('kick_f');
      else if (r<0.75) this.atk('punch');
      else if (r<0.85&&this.grounded) { this.vy=-13; this.grounded=false; this.state='jump'; }
      else this.state='idle';
    }
    this.aiCD = 18+Math.floor(Math.random()*24);
  }
}

// ── Draw Fighters ──────────────────────────────────────────────────────────
let _drawHr = '#111', _drawFem = false;
function roundRect(x,y,w,h,r,fill,stroke) {
  cx.beginPath();
  cx.moveTo(x+r,y); cx.lineTo(x+w-r,y);
  cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r); cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h); cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r); cx.quadraticCurveTo(x,y,x+r,y);
  cx.closePath();
  if(fill){cx.fillStyle=fill;cx.fill();}
  if(stroke){cx.strokeStyle=stroke;cx.lineWidth=1.2;cx.stroke();}
}

function drawF(f) {
  const alpha = (f.flash>0 && f.flash%3<2) ? 0.45 : 1.0;
  cx.save();
  cx.globalAlpha = alpha;
  cx.translate(f.x, f.y);
  cx.scale(f.dir, 1);

  // shadow: stays on ground, shrinks with height
  const height = GY - f.y;
  const srad = Math.max(0.35, 1 - height/180);
  cx.globalAlpha *= 0.3;
  cx.fillStyle='#000';
  cx.beginPath(); cx.ellipse(0, height-1, 20*srad, 5*srad, 0, 0, Math.PI*2); cx.fill();
  cx.globalAlpha = alpha;

  const sk=f.charSk||'#e8b870', wh='#f4f4ec', sh='#d0d0c8', bl=f.belt, ol='#2a2a2a';
  _drawHr = f.charHr||'#111'; _drawFem = f.charFem||false;

  switch(f.state){
    case 'idle': case 'walk_f': case 'walk_b': {
      const b = Math.sin(f.fIdx*0.8)*2.5;
      pose_idle(sk,wh,sh,bl,ol,b); break;
    }
    case 'crouch':   pose_crouch(sk,wh,sh,bl,ol); break;
    case 'bow':      pose_bow(sk,wh,sh,bl,ol); break;
    case 'jump':     pose_jump(sk,wh,sh,bl,ol); break;
    case 'punch':    pose_punch(sk,wh,sh,bl,ol,Math.min(f.fIdx/2,1)); break;
    case 'kick_f':   pose_kick_front(sk,wh,sh,bl,ol,Math.min(f.fIdx*0.6,1)); break;
    case 'kick_r':   pose_kick_round(sk,wh,sh,bl,ol,Math.min(f.fIdx/7,1)); break;
    case 'kick_h':   pose_kick_high(sk,wh,sh,bl,ol,Math.min(f.fIdx*0.55,1)); break;
    case 'kick_j':   pose_kick_jump(sk,wh,sh,bl,ol); break;
    case 'block':    pose_block(sk,wh,sh,bl,ol); break;
    case 'hit':      pose_hit(sk,wh,sh,bl,ol); break;
    case 'down':     pose_down(sk,wh,sh,bl,ol); break;
    default:         pose_idle(sk,wh,sh,bl,ol,0);
  }
  cx.restore();
  cx.globalAlpha=1;
}

// body builder helpers
function leg(x1,y1,x2,y2,x3,y3,col,ol,w=11){
  cx.lineCap='round'; cx.lineJoin='round';
  cx.strokeStyle=col; cx.lineWidth=w;
  cx.beginPath(); cx.moveTo(x1,y1); cx.lineTo(x2,y2); cx.lineTo(x3,y3); cx.stroke();
  cx.strokeStyle=ol; cx.lineWidth=1; cx.stroke();
}
function arm(x1,y1,x2,y2,x3,y3,col,sk,ol){
  cx.strokeStyle=col; cx.lineWidth=9; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(x1,y1); cx.lineTo(x2,y2); cx.lineTo(x3,y3); cx.stroke();
  cx.strokeStyle=ol; cx.lineWidth=1; cx.stroke();
  // fist
  cx.fillStyle=sk; cx.strokeStyle=ol; cx.lineWidth=1;
  cx.beginPath(); cx.arc(x3,y3,6,0,Math.PI*2); cx.fill(); cx.stroke();
}
function torso(bx,by,wh,sh,bl,ol){
  roundRect(bx-13,by-75,26,40,3,wh,ol);
  // V collar
  cx.strokeStyle=sh; cx.lineWidth=1.5;
  cx.beginPath(); cx.moveTo(bx-5,by-75); cx.lineTo(bx,by-62); cx.lineTo(bx+5,by-75); cx.stroke();
  // belt
  cx.fillStyle=bl; cx.fillRect(bx-14,by-38,28,7);
}
function head(x,y,sk,ol){
  cx.fillStyle=sk; cx.strokeStyle=ol; cx.lineWidth=1.5;
  cx.beginPath(); cx.ellipse(x,y,9,11,0,0,Math.PI*2); cx.fill(); cx.stroke();
  cx.fillStyle=_drawHr;
  if(_drawFem){
    cx.beginPath(); cx.ellipse(x,y-9,10,6,0,Math.PI,Math.PI*2); cx.fill();
    cx.fillRect(x-10,y-4,3,18);
    cx.fillRect(x+7, y-4,3,18);
    cx.beginPath(); cx.arc(x,y-15,3.5,0,Math.PI*2); cx.fill();
  } else {
    cx.beginPath(); cx.ellipse(x,y-9,9,5,0,Math.PI,Math.PI*2); cx.fill();
  }
  cx.fillStyle='#111';
  cx.fillRect(x-4,y-3,3,3); cx.fillRect(x+1,y-3,3,3);
}
function head_back(x,y,sk,ol){
  cx.fillStyle=sk; cx.strokeStyle=ol; cx.lineWidth=1.5;
  cx.beginPath(); cx.ellipse(x,y,9,11,0,0,Math.PI*2); cx.fill(); cx.stroke();
  // Back of head: full hair cap, no eyes visible
  cx.fillStyle=_drawHr;
  cx.beginPath(); cx.ellipse(x,y-3,10,9.5,0,0,Math.PI*2); cx.fill();
  if(_drawFem){
    cx.beginPath(); cx.arc(x,y-14,5,0,Math.PI*2); cx.fill(); // bun prominent at back
  }
}
// foot shape: pill oriented along +x from ankle (ax,ay); ang rotates it (0=forward flat)
function drawFoot(ax, ay, ang, sk, ol) {
  cx.save();
  cx.translate(ax, ay);
  cx.rotate(ang);
  cx.fillStyle=sk; cx.strokeStyle=ol; cx.lineWidth=1;
  cx.beginPath();
  cx.moveTo(-3, -5);
  cx.lineTo(11, -5);
  cx.arc(11, -2.5, 2.5, -Math.PI/2, Math.PI/2);
  cx.lineTo(-3, 0);
  cx.arc(-3, -2.5, 2.5, Math.PI/2, -Math.PI/2, true);
  cx.closePath();
  cx.fill(); cx.stroke();
  cx.restore();
}

function pose_idle(sk,wh,sh,bl,ol,bob=0) {
  leg(-6,-45-bob, -9,-20, -12,-6,  wh,ol);
  leg( 6,-45-bob,  8,-20,  12,-6,  wh,ol);
  drawFoot(-12, 0, 0.1, sk, ol);
  drawFoot( 12, 0, 0.1, sk, ol);
  torso(0,0-bob,wh,sh,bl,ol);
  arm(-13,-70-bob, -20,-52, -24,-40, wh,sk,ol);
  arm( 13,-70-bob,  18,-52,  22,-42, wh,sk,ol);
  head(0,-82-bob,sk,ol);
}
function pose_crouch(sk,wh,sh,bl,ol) {
  leg(-6,-25, -18,-8, -16,-6,  wh,ol,12);
  leg( 6,-25,  18,-8,  16,-6,  wh,ol,12);
  drawFoot(-16, 0, 0.1, sk, ol);
  drawFoot( 16, 0, 0.1, sk, ol);
  roundRect(-14,-55,28,32,3,wh,ol); // torso
  cx.fillStyle=bl; cx.fillRect(-14,-26,28,7);
  arm(-13,-52, -22,-38, -26,-28, wh,sk,ol);
  arm( 13,-52,  22,-38,  26,-28, wh,sk,ol);
  head(0,-64,sk,ol);
}
function pose_jump(sk,wh,sh,bl,ol) {
  leg(-6,-48, -14,-30, -10,-24, wh,ol);
  leg( 6,-48,  14,-30,  10,-24, wh,ol);
  drawFoot(-10, -18, 0.7, sk, ol);
  drawFoot( 10, -18, 0.7, sk, ol);
  torso(0,0,wh,sh,bl,ol);
  arm(-13,-70, -18,-55, -14,-42, wh,sk,ol);
  arm( 13,-70,  18,-55,  14,-42, wh,sk,ol);
  head(0,-82,sk,ol);
}
function pose_punch(sk,wh,sh,bl,ol,t) {
  leg(-6,-45, -8,-20, -12,-6, wh,ol);
  leg( 6,-45,  6,-20,  10,-6, wh,ol);
  drawFoot(-12, 0, 0.1, sk, ol);
  drawFoot( 10, 0, 0.1, sk, ol);
  torso(0,0,wh,sh,bl,ol);
  arm(-13,-70, -18,-54, -20,-42, wh,sk,ol); // guard
  // punching arm extending forward
  const px=13+t*38, py=-70;
  cx.strokeStyle=wh; cx.lineWidth=10; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(13,py); cx.lineTo(px,py); cx.stroke();
  cx.strokeStyle=ol; cx.lineWidth=1; cx.stroke();
  cx.fillStyle=sk; cx.strokeStyle=ol; cx.lineWidth=1;
  cx.beginPath(); cx.arc(px+7,py,7,0,Math.PI*2); cx.fill(); cx.stroke();
  head(0,-82,sk,ol);
}
function pose_kick_front(sk,wh,sh,bl,ol,t) {
  // standing leg
  leg(-6,-45, -8,-22, -10,-6, wh,ol);
  drawFoot(-10, 0, 0.1, sk, ol);
  torso(0,0,wh,sh,bl,ol);
  arm(-13,-70, -16,-54, -18,-42, wh,sk,ol);
  arm( 13,-70,  16,-54,  18,-44, wh,sk,ol);
  head(0,-82,sk,ol);
  // kicking leg: knee stays high, foot always below knee
  const kneex = 18 + t*14, kneey = -65 + t*10;
  const anklex = 12 + t*46, ankley = kneey + 16 + t*3;
  leg(6,-45, kneex,kneey, anklex,ankley, wh,ol,12);
  drawFoot(anklex, ankley, 1.0 - t*0.8, sk, ol);
}
function pose_kick_round(sk,wh,sh,bl,ol,t) {
  const angle    = t * 260 * Math.PI / 180;
  const spinX    = Math.cos(angle);
  const armPull  = Math.abs(Math.sin(angle));

  // Phase 1 (t 0→0.5): fighter turns away, kicking leg lifts/chambers on the left (away) side
  // Phase 2 (t 0.5→1.0): back is visible (spinX<0), kick snaps outward —
  //   local -x × negative spinX = positive visual x = toward opponent
  const chamberT = Math.min(1, t * 2);
  const kickT    = Math.max(0, t * 2 - 1);

  cx.save();
  cx.scale(spinX, 1);

  const showBack = spinX < -0.1; // past ~96° of spin → back facing viewer

  leg(6,-45, 9,-20, 12,-6, wh,ol);       // planted leg: right side, stays grounded
  drawFoot(12, 0, -0.1, sk, ol);
  if (showBack) {
    // Back view: plain gi back + center seam, no V-collar
    roundRect(-13,-75,26,40,3,wh,ol);
    cx.fillStyle=bl; cx.fillRect(-14,-38,28,7);
    cx.strokeStyle=sh; cx.lineWidth=1.2;
    cx.beginPath(); cx.moveTo(0,-75); cx.lineTo(0,-40); cx.stroke();
  } else {
    torso(0,0,wh,sh,bl,ol);
  }
  arm(-13,-70, -20*(1-armPull*.8),-55, -24*(1-armPull*.8),-45, wh,sk,ol);
  arm( 13,-70,  16*(1-armPull*.8),-54,  18*(1-armPull*.8),-45, wh,sk,ol);
  if (showBack) { head_back(0,-82,sk,ol); } else { head(0,-82,sk,ol); }

  // Kicking leg: starts left/away, chambers high as fighter turns away, then snaps out
  const kneex  = -8  - chamberT*8  - kickT*12;
  const kneey  = -18 - chamberT*32 + kickT*14;
  const anklex = -10 - chamberT*10 - kickT*56;
  const ankley = -4  - chamberT*38 + kickT*20;
  leg(-6,-46, kneex,kneey, anklex,ankley, wh,ol,12);
  drawFoot(anklex, ankley, 0.15 - kickT*0.9, sk, ol);
  cx.restore();
}
function pose_kick_high(sk,wh,sh,bl,ol,t) {
  // support leg
  leg(-8,-44, -10,-20, -12,-6, wh,ol);
  drawFoot(-12, 0, 0.1, sk, ol);
  torso(-3*t,0,wh,sh,bl,ol);
  arm(-13,-70-3*t, -8,-56-3*t, -4,-44-3*t, wh,sk,ol); // arms raise for balance
  arm( 13,-70-3*t, 22,-60-3*t, 28,-52-3*t, wh,sk,ol);
  head(-3*t,-82-2*t,sk,ol);
  // HIGH kick: foot intentionally goes above knee (exception); straight leg
  const ky = -44 - t*42;
  const kx = t*24;
  leg(6,-44, 11+t*12,-44-t*21, 16+kx,ky, wh,ol,12);
  drawFoot(16+kx, ky, -1.2, sk, ol);
}
function pose_kick_jump(sk,wh,sh,bl,ol) {
  // flying side kick - body more horizontal
  leg(-10,-40, -14,-20, -12,-8, wh,ol);
  drawFoot(-12, -8, 0.7, sk, ol);
  roundRect(-13,-72,26,36,3,wh,ol);
  cx.fillStyle=bl; cx.fillRect(-13,-39,26,6);
  arm(-13,-68, -16,-52, -12,-40, wh,sk,ol);
  arm( 13,-68,  16,-52,  14,-40, wh,sk,ol);
  head(0,-80,sk,ol);
  // kick leg extended fully forward
  leg(6,-44, 26,-34, 48,-30, wh,ol,12);
  drawFoot(48, -30, 0.3, sk, ol);
}
function pose_block(sk,wh,sh,bl,ol) {
  leg(-6,-45, -9,-20, -12,-6, wh,ol);
  leg( 6,-45,  9,-20,  12,-6, wh,ol);
  drawFoot(-12, 0, 0.1, sk, ol);
  drawFoot( 12, 0, 0.1, sk, ol);
  torso(0,0,wh,sh,bl,ol);
  // High guard: both arms raised, crossed
  cx.strokeStyle=wh; cx.lineWidth=10; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(-13,-70); cx.lineTo(-8,-82); cx.lineTo(10,-78); cx.stroke();
  cx.beginPath(); cx.moveTo( 13,-70); cx.lineTo(8,-82); cx.lineTo(-10,-78); cx.stroke();
  cx.strokeStyle=ol; cx.lineWidth=1; cx.stroke();
  head(0,-94,sk,ol);
}
function pose_hit(sk,wh,sh,bl,ol) {
  leg(-6,-42, -10,-18, -14,-6, wh,ol);
  leg( 6,-42,   8,-18,  12,-6, wh,ol);
  drawFoot(-14, 0, 0.1, sk, ol);
  drawFoot( 12, 0, 0.1, sk, ol);
  roundRect(-13,-72,26,34,3,wh,ol);
  cx.fillStyle=bl; cx.fillRect(-13,-40,26,6);
  arm(-13,-68, -20,-52, -18,-40, wh,sk,ol);
  arm( 13,-68,  20,-52,  18,-40, wh,sk,ol);
  head(14,-78,sk,ol); // head snaps back-sideways
}
function pose_down(sk,wh,sh,bl,ol) {
  cx.save(); cx.rotate(-Math.PI*0.5);
  cx.translate(20, 14);
  leg(-6,-30, -20,-20, -28,-6, wh,ol);
  leg( 6,-30,  14,-20,  20,-6, wh,ol);
  drawFoot(-28, 0, 0.1, sk, ol);
  drawFoot( 20, 0, 0.1, sk, ol);
  roundRect(-12,-60,24,34,3,wh,ol);
  cx.fillStyle=bl; cx.fillRect(-12,-28,24,6);
  arm(-12,-56, -18,-40, -14,-28, wh,sk,ol);
  arm( 12,-56,  14,-40,  12,-28, wh,sk,ol);
  head(0,-68,sk,ol);
  cx.restore();
}
function pose_bow(sk,wh,sh,bl,ol) {
  // Legs: straight like idle
  leg(-6,-45, -9,-20, -12,-6, wh,ol);
  leg( 6,-45,  8,-20,  12,-6, wh,ol);
  drawFoot(-12, 0, 0.1, sk, ol);
  drawFoot( 12, 0, 0.1, sk, ol);
  // Belt stays horizontal
  cx.fillStyle=bl; cx.fillRect(-14,-38,28,7);
  // Upper body pivots forward from hip (~30°)
  cx.save();
  cx.translate(0, -35);
  cx.rotate(0.52);
  roundRect(-13,-40,26,40,3,wh,ol);
  cx.strokeStyle=sh; cx.lineWidth=1.5;
  cx.beginPath(); cx.moveTo(-5,-40); cx.lineTo(0,-27); cx.lineTo(5,-40); cx.stroke();
  arm(-13,-35, -14,-18, -13,-3, wh,sk,ol);
  arm( 13,-35,  14,-18,  13,-3, wh,sk,ol);
  head(0,-47,sk,ol);
  cx.restore();
}

// ── Hit effects ────────────────────────────────────────────────────────────
const FX = [];
function spawnFX(x,y,pts) { FX.push({x,y,pts,life:45}); sfx('score'); }
function tickFX() {
  for (let i=FX.length-1;i>=0;i--) {
    FX[i].life--; FX[i].y-=0.6;
    if (FX[i].life<=0) FX.splice(i,1);
  }
}
function drawFX() {
  FX.forEach(e=>{
    cx.globalAlpha = e.life/45;
    cx.fillStyle='#ffee00';
    cx.font=`bold ${Math.round((16+(45-e.life)*0.3)*FS)}px "Courier New"`;
    cx.textAlign='center'; cx.fillText(`+${e.pts}pts`,e.x,e.y);
    cx.globalAlpha=1;
  });
}

// ── HUD ────────────────────────────────────────────────────────────────────
function drawHUD(p,c,round,timer) {
  const hpW=280, hh=Math.round(52*FS);
  cx.fillStyle='rgba(0,0,0,0.72)';
  cx.fillRect(0,0,W,hh);

  // Player
  cx.fillStyle='#fff'; cx.font=`bold ${Math.round(12*FS)}px "Courier New"`; cx.textAlign='left';
  cx.fillText(p.name, 12, Math.round(14*FS));
  cx.fillStyle='#333'; cx.fillRect(10, Math.round(18*FS), hpW, Math.round(16*FS));
  const pp=Math.max(0,p.hp/100);
  cx.fillStyle=pp>.5?'#22cc44':pp>.25?'#ffaa00':'#ff2222';
  cx.fillRect(10, Math.round(18*FS), hpW*pp, Math.round(16*FS));
  cx.strokeStyle='#555'; cx.lineWidth=1; cx.strokeRect(10, Math.round(18*FS), hpW, Math.round(16*FS));
  cx.fillStyle='#ffdd00'; cx.font=`bold ${Math.round(16*FS)}px "Courier New"`;
  cx.fillText(p.score, 10, Math.round(48*FS));

  // CPU
  cx.textAlign='right'; cx.fillStyle='#fff'; cx.font=`bold ${Math.round(12*FS)}px "Courier New"`;
  cx.fillText(c.name, W-12, Math.round(14*FS));
  cx.fillStyle='#333'; cx.fillRect(W-10-hpW, Math.round(18*FS), hpW, Math.round(16*FS));
  const cp=Math.max(0,c.hp/100);
  cx.fillStyle=cp>.5?'#22cc44':cp>.25?'#ffaa00':'#ff2222';
  cx.fillRect(W-10-hpW*cp, Math.round(18*FS), hpW*cp, Math.round(16*FS));
  cx.strokeStyle='#555'; cx.lineWidth=1; cx.strokeRect(W-10-hpW, Math.round(18*FS), hpW, Math.round(16*FS));
  cx.fillStyle='#ffdd00'; cx.font=`bold ${Math.round(16*FS)}px "Courier New"`;
  cx.fillText(c.score, W-10, Math.round(48*FS));

  // Center: round + timer
  cx.textAlign='center'; cx.fillStyle='#aaa'; cx.font=`${Math.round(11*FS)}px "Courier New"`;
  cx.fillText(`ROUND ${round}/3`, W/2, Math.round(13*FS));
  cx.fillStyle=timer<=10?'#ff4444':'#ffdd00';
  cx.font=`bold ${Math.round(24*FS)}px "Courier New"`;
  cx.fillText(Math.ceil(Math.max(0,timer)), W/2, Math.round(42*FS));

  // Round win dots
  const dotY=Math.round(49*FS);
  for (let i=0;i<3;i++) {
    cx.fillStyle = i<game.wins.p ? '#22cc44' : '#333';
    cx.beginPath(); cx.arc(W/2-30+i*16, dotY, 5, 0, Math.PI*2); cx.fill();
  }
  for (let i=0;i<3;i++) {
    cx.fillStyle = i<game.wins.c ? '#ff4444' : '#333';
    cx.beginPath(); cx.arc(W/2+14+i*16, dotY, 5, 0, Math.PI*2); cx.fill();
  }
}

// ── Collision ──────────────────────────────────────────────────────────────
function hitTest(a,b) {
  if (!a||!b) return false;
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}
function checkHits(atk, def) {
  const box=atk.atkBox;
  if (box&&!atk.didHit&&hitTest(box,def.body)) {
    let dmg = atk.state==='punch'?8:atk.state==='kick_f'?14:atk.state==='kick_r'?16:atk.state==='kick_h'?22:18;
    const pts=def.hurt(dmg,atk.state);
    if (pts>0) { atk.score+=pts; spawnFX(def.x, def.y-95, pts); }
    atk.didHit=true;
  }
}

// ── Announce overlay ───────────────────────────────────────────────────────
function announce(text, sub='') {
  const bw=Math.min(380,W-40), bh=88;
  cx.fillStyle='rgba(0,0,0,0.6)';
  cx.fillRect(W/2-bw/2,H/2-bh/2,bw,bh);
  cx.strokeStyle='#ffdd00'; cx.lineWidth=2;
  cx.strokeRect(W/2-bw/2,H/2-bh/2,bw,bh);
  cx.textAlign='center';
  cx.fillStyle='#ffdd00'; cx.font=`bold 27px "Courier New"`;
  cx.fillText(text, W/2, H/2+10);
  if (sub) { cx.fillStyle='#aaa'; cx.font=`11px "Courier New"`; cx.fillText(sub,W/2,H/2+28); }
}

// ── Main game object ───────────────────────────────────────────────────────
const game = {
  state: STATES.MATRIX,
  round: 1, time: 60, elapsed: 0,
  wins: {p:0, c:0},
  annText:'', annSub:'', annTimer:0,
  introStep:0, introTimer:0,
  p: null, c: null,
  init() {
    this.p = new Fighter(180, 1, true, 'PLAYER', '#d40000');
    this.c = new Fighter(620, -1, false, 'CPU',    '#111111');
  },
  startRound() {
    this.init(); this.elapsed=0;
    this.state=STATES.INTRO;
    this.introStep=0; this.introTimer=INTRO_STEPS[0].dur;
    sfx('bell');
  },
  endRound(winner) {
    if (winner==='p') { this.wins.p++; this.annText='YOU WIN!'; this.annSub=''; sfx('bell'); }
    else if (winner==='c') { this.wins.c++; this.annText='CPU WINS'; this.annSub=''; sfx('ko'); }
    else { this.annText='TIME OUT'; this.annSub=this.p.score>this.c.score?'Player leads':'CPU leads'; }
    this.state=STATES.ROUNDEND; this.annTimer=160;
    setTimeout(()=>{
      if (this.wins.p>=2||this.wins.c>=2||this.round>=3) {
        this.state=STATES.OVER;
        this.annText='HAE SAN!'; this.annSub='';
        sfx('bell');
        setTimeout(()=>{
          this.annText = this.wins.p>this.wins.c?'PLAYER WINS!':(this.wins.c>this.wins.p?'CPU WINS!':'DRAW!');
          this.annSub='TAP or ENTER to play again';
          sfx('end');
        }, 1500);
      } else {
        this.round++;
        this.startRound();
      }
    }, 2600);
  }
};

// ── Menu ───────────────────────────────────────────────────────────────────
function drawMenu() {
  drawBG(1); cx.fillRect(0,0,W,H);
  cx.textAlign='center';

  cx.fillStyle='#ffdd00'; cx.font=`bold ${Math.round(64*FSM)}px "Courier New"`;
  cx.fillText('TVG', W/2, 105);
  cx.fillStyle='#fff'; cx.font=`bold ${Math.round(18*FSM)}px "Courier New"`;
  cx.fillText('TAEKWONDO  SPARRING', W/2, 140);

  cx.fillStyle='#888'; cx.font=`${Math.round(13*FSM)}px "Courier New"`;
  cx.fillText('WEN ←   ORUN →   NOPUNDE ↑   NAJUNDE ↓   SPACE: MAKGI', W/2, 200);
  cx.fillText('A: AP JOOMUK   S: AP CHA BUSIGI   D: DWIT CHAGI   F: DOLLYO CHAGI', W/2, 222);

  // Preview fighters
  drawF(menuF_p); drawF(menuF_c);

  // Five tenets of Taekwondo
  cx.textAlign='center';
  cx.fillStyle='rgba(255,221,0,0.5)'; cx.font=`${Math.round(9*FSM)}px "Courier New"`;
  cx.fillText('— FIVE TENETS OF TAEKWONDO —', W/2, 246);
  cx.fillStyle='rgba(200,220,255,0.82)'; cx.font=`bold ${Math.round(11*FSM)}px "Courier New"`;
  cx.fillText('YE UI   ·   YOM CHI   ·   IN NAE', W/2, 263);
  cx.fillText('GUK GI   ·   BACKJOOL BOOLGGOOL', W/2, 280);

  if (Math.floor(Date.now()/600)%2===0) {
    cx.fillStyle='#ffdd00'; cx.font=`bold ${Math.round(17*FSM)}px "Courier New"`;
    cx.fillText('TAP  OR  PRESS  ENTER', W/2, 318);
  }
  cx.fillStyle='#444'; cx.font=`${Math.round(11*FSM)}px "Courier New"`;
  cx.fillText('3 Rounds — Score points by landing kicks and punches', W/2, 355);
  cx.fillText('Kick to head = 3pts  |  Kick to body = 2pts  |  Punch = 1pt', W/2, 372);
}

// ── Main Loop ──────────────────────────────────────────────────────────────
let lastTs=0;
function loop(ts) {
  const dt=Math.min((ts-lastTs)/16.67,3); lastTs=ts;

  if (game.state===STATES.MATRIX) {
    if (mtxAge===0) { cx.fillStyle='#000'; cx.fillRect(0,0,W,H); }
    drawMatrixFrame();
    mtxAge++;
    if (mtxAge>=MTX_DUR || K['Enter']) { K['Enter']=false; game.state=STATES.MENU; }
  }
  else if (game.state===STATES.MENU) {
    drawMenu();
    if (K['Enter']) { K['Enter']=false; game.round=1; game.wins={p:0,c:0}; game.startRound(); }
  }
  else if (game.state===STATES.INTRO) {
    const step = INTRO_STEPS[game.introStep];
    if (step.pose==='bow') {
      const ps=game.p.state, cs=game.c.state;
      game.p.state='bow'; game.c.state='bow';
      drawBG(game.round); drawF(game.p); drawF(game.c);
      game.p.state=ps; game.c.state=cs;
    } else {
      drawBG(game.round); drawF(game.p); drawF(game.c);
    }
    drawHUD(game.p,game.c,game.round,game.time);
    announce(step.text);
    game.introTimer--;
    if (game.introTimer<=0) {
      game.introStep++;
      if (game.introStep>=INTRO_STEPS.length) {
        game.state=STATES.FIGHT; game.annText=''; game.annSub=''; game.annTimer=0;
      } else {
        game.introTimer=INTRO_STEPS[game.introStep].dur;
      }
    }
  }
  else if (game.state===STATES.FIGHT) {
    if (game.annTimer>0) {
      game.annTimer--;
    } else {
      game.elapsed += dt/60;
      game.p.update(game.c);
      game.c.update(game.p);
      checkHits(game.p, game.c);
      checkHits(game.c, game.p);
      tickFX();
      if      (game.p.hp<=0) game.endRound('c');
      else if (game.c.hp<=0) game.endRound('p');
      else if (game.elapsed>=game.time) game.endRound(game.p.score>game.c.score?'p':game.c.score>game.p.score?'c':'draw');
    }
    drawBG(game.round);
    drawF(game.p); drawF(game.c);
    drawFX();
    drawHUD(game.p, game.c, game.round, game.time-game.elapsed);
    if (game.annTimer>0) announce(game.annText, game.annSub);
  }
  else if (game.state===STATES.ROUNDEND) {
    drawBG(game.round); drawF(game.p); drawF(game.c); drawFX();
    drawHUD(game.p,game.c,game.round,0);
    announce(game.annText, game.annSub);
  }
  else if (game.state===STATES.OVER) {
    drawBG(game.round); drawF(game.p); drawF(game.c);
    drawHUD(game.p,game.c,game.round,0);
    announce(game.annText, game.annSub);
    if (game.annSub && K['Enter']) { K['Enter']=false; game.round=1; game.wins={p:0,c:0}; game.startRound(); }
  }

  requestAnimationFrame(loop);
}
// ── Menu preview fighters (created once to avoid per-frame random char flicker) ──
const menuF_p = Object.assign(new Fighter(240,1,true,'','#d40000'), {state:'kick_h',fIdx:2,sTimer:10,fTick:0,flash:0,iFrames:0,dir:1});
const menuF_c = Object.assign(new Fighter(560,-1,false,'','#111'), {state:'kick_h',fIdx:3,sTimer:10,fTick:0,flash:0,iFrames:0,dir:-1});

requestAnimationFrame(ts=>{lastTs=ts; requestAnimationFrame(loop);});
</script>
